name: Windows Tauri Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (예: v0.1.0)"
        required: true

jobs:
  windows-tauri:
    name: Build Windows Tauri Artifacts
    runs-on: windows-2025-vs2026
    timeout-minutes: 50
    permissions:
      contents: read
      id-token: write
    outputs:
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          $tag = ""
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $tag = $env:INPUT_RELEASE_TAG
          } elseif ($env:GITHUB_REF_VALUE -like "refs/tags/*") {
            $tag = $env:REF_NAME
          }

          if ($tag) {
            Write-Host "Using release tag: $tag"
          }
          "release_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Check version consistency
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
        run: |
          if ($env:RELEASE_TAG) {
            npm run check:versions -- --release-tag "$env:RELEASE_TAG"
          } else {
            npm run check:versions
          }

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Run Tauri Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build desktop bundle
        run: npm run build -w apps/desktop

      - name: Build Windows installer (MSI + NSIS)
        run: npm run tauri:build -w apps/desktop
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID || '' }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID || vars.VITE_GOOGLE_OAUTH_CLIENT_ID || '' }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET || '' }}

      - name: Resolve Azure Artifact Signing config
        id: artifact_signing
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID || '' }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID || '' }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID || '' }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT || vars.AZURE_ARTIFACT_SIGNING_ENDPOINT || '' }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME || vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME || '' }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME || vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME || '' }}
        run: |
          $isReleaseBuild = $env:EVENT_NAME -eq "workflow_dispatch" -or $env:GITHUB_REF_VALUE -like "refs/tags/*"

          if ($env:EVENT_NAME -eq "pull_request") {
            Write-Host "Azure Artifact Signing is skipped for pull_request builds."
            "enabled=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $requiredVariables = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "AZURE_ARTIFACT_SIGNING_ENDPOINT",
            "AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME",
            "AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME"
          )
          $missingVariables = @(
            $requiredVariables | Where-Object {
              [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_))
            }
          )

          if ($missingVariables.Count -gt 0) {
            $message = "Azure Artifact Signing config is missing: $($missingVariables -join ', ')"
            if ($isReleaseBuild) {
              Write-Error "Release signing requires a complete Azure Artifact Signing configuration. $message"
              exit 1
            }

            Write-Warning "$message. Unsigned branch artifact build will continue."
            "enabled=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Azure Artifact Signing is enabled for this build."
          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Azure login for Artifact Signing
        if: steps.artifact_signing.outputs.enabled == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSI installer with Azure Artifact Signing
        if: steps.artifact_signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT || vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME || vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME || vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\apps\desktop\src-tauri\target\release\bundle\msi
          files-folder-filter: msi
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: H Memo Windows MSI installer
          description-url: https://github.com/${{ github.repository }}

      - name: Sign NSIS installer with Azure Artifact Signing
        if: steps.artifact_signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT || vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME || vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME || vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\apps\desktop\src-tauri\target\release\bundle\nsis
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: H Memo Windows NSIS installer
          description-url: https://github.com/${{ github.repository }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: h-memo-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: h-memo-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Publish GitHub Release
    needs: windows-tauri
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Confirm release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.windows-tauri.outputs.release_tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag was not provided by the validated build job." >&2
            exit 1
          fi

          echo "Using validated release tag: $RELEASE_TAG"

      - name: Download MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: h-memo-windows-msi
          path: release-assets/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v8
        with:
          name: h-memo-windows-nsis
          path: release-assets/nsis

      - name: Upload installers to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.windows-tauri.outputs.release_tag }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          mapfile -t msi_files < <(find release-assets/msi -type f -name "*.msi" | sort)
          if [ "${#msi_files[@]}" -eq 0 ]; then
            echo "No MSI file found in release-assets/msi." >&2
            exit 1
          fi

          mapfile -t nsis_files < <(find release-assets/nsis -type f -name "*.exe" | sort)
          if [ "${#nsis_files[@]}" -eq 0 ]; then
            echo "No NSIS installer file found in release-assets/nsis." >&2
            exit 1
          fi

          artifacts=("${msi_files[@]}" "${nsis_files[@]}")
          echo "Found ${#msi_files[@]} MSI and ${#nsis_files[@]} NSIS files."

          tag_ref="tags/$RELEASE_TAG"
          existing_tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/${tag_ref}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$RELEASE_TARGET" ]; then
            echo "Release tag $RELEASE_TAG already points to $existing_tag_sha, but this workflow built $RELEASE_TARGET." >&2
            echo "Run the workflow from the matching tag/ref or use a new release tag." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Uploading installers..."
            gh release upload "$RELEASE_TAG" "${artifacts[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating new release $RELEASE_TAG at $RELEASE_TARGET..."
            gh release create "$RELEASE_TAG" "${artifacts[@]}" --repo "$GITHUB_REPOSITORY" --title "H Memo $RELEASE_TAG" --notes "Release $RELEASE_TAG" --target "$RELEASE_TARGET"
          fi
