name: Windows Tauri Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (예: v0.1.0)"
        required: true

jobs:
  windows-tauri:
    name: Build Windows Tauri Artifacts
    runs-on: windows-latest
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build desktop bundle
        run: npm run build -w apps/desktop

      - name: Build Windows installer (MSI + NSIS)
        run: npm run tauri:build -w apps/desktop
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID || '' }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: h-memo-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: h-memo-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Publish GitHub Release
    needs: windows-tauri
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_RELEASE_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v.+ ]]; then
            echo "Release tag must start with 'v' (예: v0.1.0). Provided: $tag" >&2
            exit 1
          fi

          echo "Using release tag: $tag"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: h-memo-windows-msi
          path: release-assets/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: h-memo-windows-nsis
          path: release-assets/nsis

      - name: Upload installers to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          mapfile -t msi_files < <(find release-assets/msi -type f -name "*.msi" | sort)
          if [ "${#msi_files[@]}" -eq 0 ]; then
            echo "No MSI file found in release-assets/msi." >&2
            exit 1
          fi

          mapfile -t nsis_files < <(find release-assets/nsis -type f -name "*.exe" | sort)
          if [ "${#nsis_files[@]}" -eq 0 ]; then
            echo "No NSIS installer file found in release-assets/nsis." >&2
            exit 1
          fi

          artifacts=("${msi_files[@]}" "${nsis_files[@]}")
          echo "Found ${#msi_files[@]} MSI and ${#nsis_files[@]} NSIS files."

          tag_ref="tags/$RELEASE_TAG"
          existing_tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/${tag_ref}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$RELEASE_TARGET" ]; then
            echo "Release tag $RELEASE_TAG already points to $existing_tag_sha, but this workflow built $RELEASE_TARGET." >&2
            echo "Run the workflow from the matching tag/ref or use a new release tag." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --json tagName -q .tagName > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Uploading installers..."
            gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
          else
            echo "Creating new release $RELEASE_TAG at $RELEASE_TARGET..."
            gh release create "$RELEASE_TAG" "${artifacts[@]}" --title "H Memo $RELEASE_TAG" --notes "Release $RELEASE_TAG" --target "$RELEASE_TARGET"
          fi
