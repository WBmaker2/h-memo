name: Windows Tauri Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (예: v0.1.0)"
        required: true

jobs:
  windows-tauri:
    name: Build Windows Tauri Artifacts
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build desktop bundle
        run: npm run build -w apps/desktop

      - name: Build Windows installer (MSI + NSIS)
        run: npm run tauri:build -w apps/desktop
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID || '' }}

      - name: Resolve release tag
        id: release_tag
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.release_tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }

          if (-not ($tag -match '^v.+')) {
            Write-Error "Release tag must start with 'v' (예: v0.1.0). Provided: $tag"
            exit 1
          }

          Write-Host "Using release tag: $tag"
          "release_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: h-memo-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: h-memo-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload installers to GitHub Release
        if: steps.release_tag.outputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
        run: |
          $msiFiles = Get-ChildItem -Path "apps/desktop/src-tauri/target/release/bundle/msi" -Filter "*.msi"
          if ($msiFiles.Count -eq 0) {
            Write-Error "No MSI file found in bundle/msi."
            exit 1
          }

          $nsisFiles = Get-ChildItem -Path "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter "*.exe"
          if ($nsisFiles.Count -eq 0) {
            Write-Error "No NSIS installer file found in bundle/nsis."
            exit 1
          }

          $artifacts = @()
          $artifacts += $msiFiles | ForEach-Object { $_.FullName }
          $artifacts += $nsisFiles | ForEach-Object { $_.FullName }

          Write-Host "Found $($msiFiles.Count) MSI and $($nsisFiles.Count) NSIS files."

          gh release view "$env:RELEASE_TAG" --json tagName -q .tagName > $null 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:RELEASE_TAG already exists. Uploading installers..."
            gh release upload "$env:RELEASE_TAG" @artifacts --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Creating new release $env:RELEASE_TAG..."
            gh release create "$env:RELEASE_TAG" @artifacts --title "H Memo $env:RELEASE_TAG" --notes "Release $env:RELEASE_TAG"
            exit $LASTEXITCODE
          }
