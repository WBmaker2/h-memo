name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js:
    name: JS Tests + Typecheck + Desktop Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build desktop package
        run: npm run build -w apps/desktop
